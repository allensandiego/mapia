output: dist/
releases:
  - name: release
    jobs:
      - name: windows-msix
        package:
          platform: windows
          target: msix
        config:
          display_name: Mapia
          publisher_display_name: Allensandiego
          identity_name: com.allensandiego.mapia
          msix_config:
            install_scope: user
        artifact_name: "mapia-windows-x64.msix"
      - name: windows-exe
        package:
          platform: windows
          target: exe
        config:
          display_name: Mapia
          publisher_display_name: Allensandiego
        artifact_name: "mapia-windows-x64.exe"
      - name: linux-deb
        package:
          platform: linux
          target: deb
        config:
          display_name: Mapia
          package_name: mapia
          categories: "Utility;Network;Development;"
          maintainer:
            name: Allen San Diego
            email: contact@allensandiego.com
          priority: optional
          section: x11
          installed_size: 250000
          icon_path: linux/packaging/deb/mapia.png
        artifact_name: "mapia-linux-amd64.deb"
      - name: linux-rpm
        package:
          platform: linux
          target: rpm
        config:
          display_name: Mapia
          package_name: mapia
          summary: Yes another REST API client
          group: Applications/Networking
          vendor: Allensandiego
          license: MIT
          url: https://github.com/allensandiego/mapia
          icon_path: linux/packaging/rpm/mapia.png
        artifact_name: "mapia-linux-x86_64.rpm"
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
        config:
          display_name: Mapia
          package_name: mapia
          categories: "Utility;Network;Development;"
          icon_path: linux/packaging/appimage/mapia.png
          desktop_file_path: linux/packaging/appimage/mapia.desktop
        artifact_name: "mapia-linux-x86_64.AppImage"
      - name: macos-dmg
        package:
          platform: macos
          target: dmg
        config:
          display_name: Mapia
          package_name: com.allensandiego.mapia
        artifact_name: "mapia-macos.dmg"
