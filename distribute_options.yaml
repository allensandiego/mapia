output: dist/
releases:
  - name: release
    jobs:
      - name: windows-msix
        package:
          platform: windows
          target: msix
      - name: windows-exe
        package:
          platform: windows
          target: exe
      - name: linux-deb
        package:
          platform: linux
          target: deb
      - name: linux-rpm
        package:
          platform: linux
          target: rpm
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
      - name: macos-dmg
        package:
          platform: macos
          target: dmg
