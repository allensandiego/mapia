name: Release Build

on:
  push:
    tags:
      - '*' # Trigger on tags like v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: |
          flutter pub get
          dart pub global activate fastforge

      - name: Build and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          fastforge release --name release --jobs windows-msix,windows-exe

      - name: Build and Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          npm install -g appdmg
          fastforge release --name release --jobs macos-dmg

      - name: Build and Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install toolkits for DEB, RPM, and AppImage
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev pkg-config ruby ruby-dev build-essential fuse rpm binutils patchelf
          sudo gem install fpm
          wget --no-check-certificate -O appimagetool.real https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.real
          sudo mv appimagetool.real /usr/local/bin/appimagetool.real
          
          # Create wrapper to inject Categories before appimagetool validation
          sudo tee /usr/local/bin/appimagetool <<EOF
          #!/bin/bash
          # Find the desktop file in the AppDir (the first argument is usually the AppDir)
          # We search for it within the provided directory argument
          for arg in "\$@"; do
            if [ -d "\$arg" ] && [ -f "\$arg/mapia.desktop" ]; then
              echo "Wrapper: Injecting Categories into \$arg/mapia.desktop"
              grep -q "Categories=" "\$arg/mapia.desktop" || sed -i '/^Type=Application$/a Categories=Utility;Network;Development' "\$arg/mapia.desktop"
              break
            fi
          done
          exec /usr/local/bin/appimagetool.real "\$@"
          EOF
          sudo chmod +x /usr/local/bin/appimagetool
          
          # Ensure icons exist for all packaging configs and at project root
          for dir in linux/packaging/appimage linux/packaging/deb linux/packaging/rpm; do
            if [ ! -f "$dir/mapia.png" ]; then
              echo "Copying icon to $dir/"
              cp assets/mapia.png "$dir/mapia.png"
            fi
            ls -la "$dir/mapia.png"
          done
          
          # Copy icon to project root for flutter_app_packager
          cp assets/mapia.png ./mapia.png
          
          # Build and Package
          fastforge release --name release --jobs linux-deb,linux-appimage
          # Build RPM with manual fix
          fastforge release --name release --jobs linux-rpm --skip-clean || {
            echo "RPM build failed, attempting fix..."
            # Use a subshell with ls to avoid syntax errors with 2>/dev/null in the for loop
            for spec_file in $(ls dist/*/mapia-*-linux_rpm/rpmbuild/SPECS/*.spec 2>/dev/null); do
              if [ -f "$spec_file" ]; then
                # Get absolute path for topdir to avoid relative path issues in rpmbuild
                topdir=$(readlink -f "$(dirname "$(dirname "$spec_file")")")
                build_dir="$topdir/BUILD"

                # Ensure necessary files are in the BUILD directory
                cp mapia.png "$build_dir/" 2>/dev/null || cp linux/packaging/rpm/mapia.png "$build_dir/" || :
                cp mapia.desktop "$build_dir/" 2>/dev/null || cp linux/packaging/appimage/mapia.desktop "$build_dir/" || :

                sed -i '/^cp -r %{name}\.png /s/$/ || :/' "$spec_file"
                sed -i '/^cp -r %{name}\.desktop /s/$/ || :/' "$spec_file"  

                rpmbuild --define "_topdir $topdir" -bb "$spec_file" 
              fi
            done
          }


      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2.6.0
        with:
          files: |
            dist/**/*.msix
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

