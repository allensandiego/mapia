name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: |
          flutter pub get
          dart pub global activate fastforge

      - name: Build and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          fastforge release --name release --jobs windows-msix,windows-exe

      - name: Build and Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          fastforge release --name release --jobs macos-dmg

      - name: Build and Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install toolkits for DEB, RPM, and AppImage
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev pkg-config ruby ruby-dev build-essential fuse rpm binutils patchelf
          sudo gem install fpm
          wget --no-check-certificate -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
          fastforge release --name release --jobs linux-deb,linux-appimage
          # Build RPM with error handling and manual fix if needed
          fastforge release --name release --jobs linux-rpm --skip-clean || {
            echo "RPM build failed, attempting fix..."
            for spec_file in dist/*/mapia-*-linux_rpm/rpmbuild/SPECS/*.spec 2>/dev/null; do
              if [ -f "$spec_file" ]; then
                sed -i '/^cp -r %{name}\.png /s/$/ || :/' "$spec_file"
                sed -i '/^cp -r %{name}\.desktop /s/$/ || :/' "$spec_file"  
                sed -i '/%attr.*%{_datadir}\/pixmaps.*png/d' "$spec_file"
                topdir=$(dirname "$(dirname "$spec_file")")
                rpmbuild --define "_topdir $topdir" -bb "$spec_file" 
                # Move the manually built RPM to where fastforge (and the upload step) expects it
                mkdir -p "$(dirname "$topdir")/release"
                find "$topdir/RPMS" -name "*.rpm" -exec cp {} "$(dirname "$topdir")/release/" \;
              fi
            done
          }

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2.6.0
        with:
          files: |
            dist/*/release/*.msix
            dist/*/release/*.exe
            dist/*/release/*.dmg
            dist/*/release/*.AppImage
            dist/*/release/*.deb
            dist/*/release/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

