name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build and Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dart run flutter_distributor:distribute --name release --jobs windows

      - name: Build and Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          dart run flutter_distributor:distribute --name release --jobs macos

      - name: Build and Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install appimagetool for AppImage generation
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config fuse
          wget --no-check-certificate -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/
          dart run flutter_distributor:distribute --name release --jobs linux

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*/release/*.msix
            dist/*/release/*.dmg
            dist/*/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
