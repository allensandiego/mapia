name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Desktop Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev liblzma-dev libstdc++-12-dev pkg-config

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Application
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            flutter build windows --release
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            flutter build macos --release
          else
            flutter build linux --release
          fi
        shell: bash

      - name: Package Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd build/windows/x64/runner/Release
          7p zip -r ../../../../mapia-windows-x64.zip .
        shell: pwsh

      - name: Package Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../mapia-macos.zip Mapia.app
        shell: bash

      - name: Package Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../mapia-linux-x64.tar.gz .
        shell: bash

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mapia-windows-x64.zip
            mapia-macos.zip
            mapia-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
